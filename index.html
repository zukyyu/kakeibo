<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>最安値帳｜スマート家計簿</title>
<meta name="theme-color" content="#1E6B47">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
/* ============================================================
   デザイントークン — 「デジタル底値帳」
   感熱紙の白 / スーパーの深緑 / 値札の赤 / 底値ステッカーの黄
   ============================================================ */
:root{
  --paper:#F2F1EC;      /* レシート紙のクールな白 */
  --card:#FFFFFF;
  --ink:#20291F;
  --muted:#6E7A72;
  --line:#DFDDD4;
  --green:#1E6B47;      /* 主アクセント（青果の緑） */
  --green-soft:#E4EFE8;
  --price-red:#D8402C;  /* 値札の赤 — 「効く価格」だけに使う */
  --tag-yellow:#F6C84B; /* 底値ステッカー */
  --ok:#1E6B47; --warn:#B98A00; --err:#C43B3B;
  --warn-soft:#FBF3DC; --err-soft:#FAE7E5;
  --r:12px;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Courier New",monospace;
}
*{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic","Noto Sans JP",sans-serif;
  background:var(--paper);color:var(--ink);font-size:15px;line-height:1.55;
  overscroll-behavior-y:none;-webkit-tap-highlight-color:transparent;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select{font:inherit;color:inherit;font-size:16px}
:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.eyebrow{font-size:11px;letter-spacing:.14em;color:var(--muted);font-weight:600}
.muted{color:var(--muted)}
.red{color:var(--price-red)}

/* ---- レイアウト ---- */
#app{max-width:560px;margin:0 auto;padding:0 16px calc(84px + env(safe-area-inset-bottom))}
.topbar{position:sticky;top:0;z-index:20;background:var(--paper);
  display:flex;align-items:center;gap:10px;padding:14px 2px 10px;border-bottom:1px solid var(--line)}
.topbar h1{font-size:19px;font-weight:800;letter-spacing:.02em}
.pill{font-size:11px;font-weight:700;color:var(--warn);background:var(--warn-soft);
  border:1px solid #EAD9A6;border-radius:999px;padding:2px 9px}
.section{margin-top:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px}

/* ---- ボタン ---- */
.btn{-webkit-user-select:none;user-select:none;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  border-radius:var(--r);padding:15px;font-weight:700;font-size:15px}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:active{background:#175539}
.btn-ghost{background:var(--card);border:1px solid var(--line)}
.btn:disabled{opacity:.45;cursor:default}
.lnk{color:var(--green);font-weight:700;font-size:13px;padding:4px 6px}

/* ---- リスト行 ---- */
.row{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .grow{flex:1;min-width:0}
.row .t1{font-weight:600}
.row .t2{font-size:12px;color:var(--muted)}
.price{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:700;white-space:nowrap}

/* ---- ホーム ---- */
.hero{padding:20px 4px 6px}
.hero .amount{font-family:var(--mono);font-variant-numeric:tabular-nums;
  font-size:40px;font-weight:800;letter-spacing:-.01em;margin-top:2px}
.hero .sub{font-size:12px;color:var(--muted);margin-top:2px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}

/* ---- カレンダー ---- */
.cal-head{display:flex;align-items:center;justify-content:space-between;padding:4px 0 10px}
.cal-head .m{font-size:17px;font-weight:800}
.cal-nav{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--card);font-size:16px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.dow{text-align:center;font-size:11px;color:var(--muted);padding:3px 0;font-weight:600}
.dow.sun{color:var(--price-red)}.dow.sat{color:#3D6AA8}
.day{min-height:56px;border-radius:9px;background:var(--card);border:1px solid var(--line);
  padding:5px 4px;display:flex;flex-direction:column;align-items:center;gap:2px}
.day.blank{background:transparent;border-color:transparent}
.day .d{font-size:12px;font-weight:600}
.day .v{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--green)}
.day .mmark{font-size:8px;font-weight:800;color:var(--price-red);letter-spacing:.02em;margin-top:-1px}
.day .d.sun{color:var(--price-red)}.day .d.sat{color:#3D6AA8}
.day.today{border:2px solid var(--green)}
.day:active{background:var(--green-soft)}

/* ---- 検索・底値（シグネチャ：レシートカード） ---- */
.search-in{width:100%;padding:12px 14px;border-radius:var(--r);border:1px solid var(--line);
  background:var(--card);font-size:15px}
.receipt{position:relative;background:var(--card);border:1px solid var(--line);border-bottom:none;
  border-radius:var(--r) var(--r) 0 0;padding:18px 16px 14px;margin-top:16px}
.zig{height:9px;margin-bottom:14px;
  background:
    linear-gradient(135deg,var(--card) 50%,transparent 50%) 0 0/14px 9px repeat-x,
    linear-gradient(225deg,var(--card) 50%,transparent 50%) 7px 0/14px 9px repeat-x;
  filter:drop-shadow(0 1px 0 var(--line))}
.receipt .low{font-family:var(--mono);font-variant-numeric:tabular-nums;
  font-size:38px;font-weight:800;color:var(--price-red);line-height:1.1;margin-top:4px}
.receipt .where{margin-top:4px;font-weight:700}
.receipt .meta{display:flex;gap:14px;margin-top:12px;padding-top:10px;border-top:1px dashed var(--line);
  font-size:12px;color:var(--muted)}
.receipt .meta b{display:block;color:var(--ink);font-family:var(--mono);font-size:14px}
.sticker{position:absolute;top:-10px;right:12px;transform:rotate(-5deg);
  background:var(--tag-yellow);color:#5E4A00;font-weight:800;font-size:12px;letter-spacing:.1em;
  padding:7px 12px;border-radius:999px;box-shadow:0 2px 5px rgba(0,0,0,.18)}
.sort-chips{display:flex;gap:8px;margin:14px 0 4px}
.hist .low-row{background:#FFF8E2;margin:0 -8px;padding-left:10px;padding-right:10px;border-radius:8px}
.badge{font-size:10px;font-weight:800;background:var(--tag-yellow);color:#5E4A00;
  border-radius:5px;padding:2px 6px;margin-left:6px;letter-spacing:.08em}

/* ---- チップ ---- */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{-webkit-user-select:none;user-select:none;border:1px solid var(--line);background:var(--card);border-radius:999px;
  padding:7px 13px;font-size:13px;font-weight:600}
.chip .pct{color:var(--muted);font-family:var(--mono);font-size:11px}
.chip.on{background:var(--green);border-color:var(--green);color:#fff}
.chip.new{border-style:dashed;color:var(--green)}
.chip.alert{border-color:#EBB6AE;color:var(--err);background:var(--err-soft)}
.chips.scroll{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}

/* ---- 入力 ---- */
.in{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--card)}
.in.mini{padding:8px 9px;font-family:var(--mono);font-variant-numeric:tabular-nums;text-align:right}
.field label{display:block;font-size:11px;color:var(--muted);font-weight:700;margin-bottom:4px}

/* ---- 確認画面（オーバーレイ） ---- */
.overlay{position:fixed;inset:0;z-index:50;background:var(--paper);display:none;flex-direction:column}
.overlay.open{display:flex}
.ov-head{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line);background:var(--card)}
.ov-head h2{flex:1;font-size:16px;font-weight:800;text-align:center}
.ov-body{flex:1;overflow-y:auto;overscroll-behavior:contain;padding:14px 14px 20px;max-width:560px;width:100%;margin:0 auto}
.ov-foot{border-top:1px solid var(--line);background:var(--card);
  padding:10px 14px calc(10px + env(safe-area-inset-bottom))}
.ov-foot .sumline{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:9px}
.ov-foot .sumline .sp{flex:1}
.chk-ok{color:var(--ok);font-weight:700}
.chk-ng{color:var(--err);font-weight:700}

.lcard{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--muted);
  border-radius:10px;padding:11px 12px;margin-bottom:10px}
.lcard.st-ok{border-left-color:var(--ok)}
.lcard.st-cand{border-left-color:var(--tag-yellow)}
.lcard.st-none{border-left-color:var(--err)}
.lcard .raw{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:7px}
.lcard .pline{display:flex;align-items:center;gap:6px}
.lcard .pname{font-weight:700;flex:1}
.lcard .nums{display:flex;align-items:center;gap:7px;margin-top:9px}
.lcard .nums .f{flex:1}
.lcard .nums .lab{font-size:10px;color:var(--muted);font-weight:700;display:block;margin-bottom:2px}
.lcard .ltotal{font-family:var(--mono);font-weight:800;white-space:nowrap;padding-top:13px}
.lcard .del{color:var(--muted);font-size:17px;padding:8px 4px 0 4px}
.sug{margin-top:8px;display:flex;flex-wrap:wrap;gap:8px}
.hint{font-size:12px;color:var(--muted)}
.legend{display:flex;gap:12px;font-size:11px;color:var(--muted);margin:2px 0 12px}
.legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:4px;vertical-align:-1px}

/* ---- 日別シート ---- */
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--card);
  border-radius:18px 18px 0 0;box-shadow:0 -8px 30px rgba(0,0,0,.16);
  max-height:72vh;overflow-y:auto;overscroll-behavior:contain;transform:translateY(105%);transition:transform .22s ease;
  padding:16px 18px calc(20px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto}
.sheet.open{transform:translateY(0)}
.scrim{position:fixed;inset:0;z-index:39;background:rgba(30,40,33,.35);display:none}
.scrim.show{display:block}
.sheet .grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 12px}
.sheet h3{font-size:15px;font-weight:800;display:flex;align-items:baseline;gap:10px}
.store-h{font-size:12px;font-weight:800;color:var(--green);margin-top:14px}

/* ---- 下部ナビ ---- */
nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--card);
  border-top:1px solid var(--line);display:flex;max-width:560px;margin:0 auto;
  padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;-webkit-user-select:none;user-select:none;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:9px 0 7px;font-size:10px;font-weight:700;color:var(--muted)}
nav button.on{color:var(--green)}
nav svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.9;
  stroke-linecap:round;stroke-linejoin:round}

/* ---- 汎用オーバーレイ ---- */
#busy{position:fixed;inset:0;z-index:80;background:rgba(242,241,236,.9);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#busy.show{display:flex}
.spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--line);
  border-top-color:var(--green);animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#toast{position:fixed;left:50%;bottom:calc(92px + env(safe-area-inset-bottom));transform:translateX(-50%);
  z-index:90;background:var(--ink);color:#fff;font-size:13px;font-weight:600;
  padding:10px 16px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .2s;max-width:88vw}
#toast.show{opacity:1}
.empty{padding:26px 8px;text-align:center;color:var(--muted);font-size:13px}

/* ---- 生活費（予算）カード ---- */
.bhead{display:flex;align-items:center;justify-content:space-between}
.bwrap{display:flex;gap:16px;align-items:center;margin-top:10px}
.bleft{flex:1;min-width:0}
.brow{display:flex;justify-content:space-between;font-size:14px;padding:3px 0}
.brow .v{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:700}
.donut{width:96px;height:96px;border-radius:50%;position:relative;flex:none}
.donut::after{content:'';position:absolute;inset:27%;border-radius:50%;background:var(--card)}
.bremain{display:flex;align-items:baseline;justify-content:space-between;border-top:1px dashed var(--line);margin-top:10px;padding-top:10px}
.bremain .amt{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:30px;font-weight:800}
.over{color:var(--price-red)}
.bar{height:8px;border-radius:4px;background:var(--line);overflow:hidden;margin-top:10px}
.bar i{display:block;height:100%;border-radius:4px}
.legend2{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:12px;font-size:11px;color:var(--muted)}
.legend2 b{color:var(--ink);font-family:var(--mono);font-weight:700}
.legend2 .dot{display:inline-block;width:8px;height:8px;border-radius:3px;margin-right:5px;vertical-align:-1px}
</style>

<div id="app"></div>

<!-- 下部ナビ -->
<nav id="nav"></nav>

<!-- カレンダー日別シート -->
<div class="scrim" id="scrim" data-action="sheet-close"></div>
<div class="sheet" id="sheet"></div>

<!-- OCR確認・手入力オーバーレイ -->
<div class="overlay" id="confirm"></div>

<!-- 共通 -->
<div id="busy"><div class="spin"></div><div id="busy-msg" class="muted" style="font-size:13px;font-weight:600"></div></div>
<div id="toast"></div>
<input type="file" id="camIn" accept="image/*" capture="environment" hidden>
<input type="file" id="libIn" accept="image/*" hidden>

<script>
'use strict';
/* ================================================================
   底値帳 PWA 雛形
   - GAS未設定の間は「デモモード」（サンプルデータ＋擬似OCR）で全機能が動く
   - 通信は fetch(POST, ヘッダ無し=text/plain) → GASのCORSプリフライト回避
   - localStorage は安全ラッパー経由（プレビュー等で使えない環境でも動作）
   ================================================================ */

/* ---------- 小道具 ---------- */
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const num = v => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
const yen = n => '¥' + Math.round(num(n)).toLocaleString('ja-JP');
const d2  = n => String(n).padStart(2, '0');
const dstr = dt => `${dt.getFullYear()}-${d2(dt.getMonth()+1)}-${d2(dt.getDate())}`;
const todayStr = () => dstr(new Date());
const fmtMD = s => { const [,m,d] = s.split('-'); return `${+m}/${+d}`; };
const uid = p => p + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

/* 会計期間の締め日（毎月この日から翌月の前日までを1つの「月度」とする） */
const CYCLE_START = 15;

/* 表記の機械的正規化（第1層）: NFKCで半角カナ→全角など一括変換 */
const norm = s => String(s ?? '').normalize('NFKC').replace(/[\s\u3000・･.,，、。]/g, '').toUpperCase();

/* バイグラムDice係数（第3層のあいまい候補用） */
function bigrams(s){ const r=[]; for(let i=0;i<s.length-1;i++) r.push(s.slice(i,i+2)); return r.length?r:[s]; }
function dice(a, b){
  if(!a || !b) return 0;
  if(a === b) return 1;
  const A = bigrams(a), B = bigrams(b), m = new Map();
  A.forEach(g => m.set(g, (m.get(g)||0)+1));
  let hit = 0;
  B.forEach(g => { const c = m.get(g); if(c){ hit++; m.set(g, c-1); } });
  return 2*hit / (A.length + B.length);
}

/* localStorage 安全ラッパー（使えない環境ではメモリに退避） */
const mem = {};
const store = {
  get(k){ try { return localStorage.getItem(k); } catch(e){ return mem[k] ?? null; } },
  set(k,v){ try { localStorage.setItem(k,v); } catch(e){ mem[k]=v; } },
  del(k){ try { localStorage.removeItem(k); } catch(e){ delete mem[k]; } }
};

/* ---------- 状態 ---------- */
const state = {
  cfg: { gasUrl:'', token:'' },
  demo: false,
  lastSync: null,
  data: { items:[], products:[], stores:[], aliases:[], genres:[] },
  view: 'home',
  calY: cycleOf(new Date()).y, calM: cycleOf(new Date()).m,   // 現在の月度で初期化
  selDay: null,
  q: '', selProd: null, sort: 'price',
  pending: null,  // 確認画面の編集中データ
  mergeSel: [],   // 名寄せで選択中の商品ID
  genreEdit: null, genreInput: '', genreQ: ''
};

/* ---------- API層 ----------
   GAS Webアプリへは Content-Type ヘッダを付けずにPOSTする（重要）。
   ヘッダを付けるとプリフライト(OPTIONS)が飛び、GASは応答できず失敗する。 */
async function api(action, payload = {}){
  if(!state.cfg.gasUrl) return demoApi(action, payload);
  const res = await fetch(state.cfg.gasUrl, {
    method: 'POST',
    body: JSON.stringify({ action, token: state.cfg.token, ...payload })
  });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const j = await res.json();
  if(j.error) throw new Error(j.error);
  return j;
}

/* ---------- 参照ヘルパ ---------- */
const P = () => state.pending;
const allProducts = () => state.data.products.concat(P() ? P().newProducts : []);
const allStores   = () => state.data.stores.concat(P() ? P().newStores : []);
const prodById  = id => allProducts().find(p => p.id === id);
const storeById = id => allStores().find(s => s.id === id);
const confirmedItems = () => state.data.items.filter(i => i.status === '確定');

/* ---------- カテゴリ自動判定 ----------
   商品名のキーワードから食費のカテゴリを推定する簡易辞書。
   新規商品の登録時に自動で付与し、ホームの内訳グラフにも使う。 */
const CAT_RULES = [
  ['惣菜・弁当', ['弁当','惣菜','おにぎり','寿司','コロッケ','唐揚','肉まん','ピザ','サンドイッチ']],
  ['乳製品',     ['牛乳','ミルク','ヨーグルト','チーズ','バター','生クリーム']],
  ['卵',         ['たまご','玉子','卵']],
  ['豆腐・大豆', ['豆腐','納豆','油揚','厚揚','豆乳']],
  ['パン',       ['パン','ベーグル','ロール','クロワッサン']],
  ['米・麺',     ['米','ごはん','パスタ','うどん','そば','ラーメン','そうめん','麺']],
  ['野菜',       ['キャベツ','きゃべつ','レタス','トマト','とまと','きゅうり','人参','にんじん','玉ねぎ','たまねぎ','じゃがいも','ねぎ','ほうれん','もやし','大根','白菜','ピーマン','ブロッコリー','しめじ','えのき','きのこ','きくらげ','なす','ごぼう','サラダ']],
  ['果物',       ['バナナ','りんご','みかん','いちご','ぶどう','キウイ','ブルーベリー','レモン','もも','梨','スイカ','メロン','フルーツ','アボカド']],
  ['肉',         ['牛肉','豚','鶏','ひき肉','ミンチ','ウインナー','ソーセージ','ハム','ベーコン','ラム','ムネ','モモ','ささみ']],
  ['魚介',       ['さけ','鮭','サーモン','まぐろ','マグロ','さば','サバ','いわし','刺身','えび','エビ','いか','たこ','しらす','ちくわ','かまぼこ','魚']],
  ['菓子',       ['チョコ','クッキー','ビスケット','スナック','チップス','アイス','ガム','キャンディ','グミ','せんべい','プリン','ゼリー','ケーキ','菓子','ポテチ']],

function genreDict(){ return (state.data.genres || []); }
function guessGenre(raw, name){
  const n = norm(raw || name || '');
  if(!n) return '';
  const learned = genreDict().find(g => g.norm === n);   // (1) 学習済み辞書（最優先）
  if(learned) return learned.genre;
  for(const [genre, kws] of GENRE_RULES){                // (2) 既知キーワード
    for(const kw of kws){ if(n.includes(norm(kw))) return genre; }
  }
  return '';                                             // (3) 未分類
}
/* 商品の実効ジャンル: 明示設定 → 学習/キーワード判定 */
function effGenre(p){
  if(!p) return '';
  if(p.genre) return p.genre;
  return guessGenre(p.name, p.name);
}
/* 既存の全ジャンル一覧（辞書＋商品＋ルール）を集めて候補に使う */
function allGenres(){
  const set = new Set();
  GENRE_RULES.forEach(r => set.add(r[0]));
  (state.data.products || []).forEach(p => { const g = effGenre(p); if(g) set.add(g); });
  genreDict().forEach(g => { if(g.genre) set.add(g.genre); });
  return Array.from(set).sort();
}

/* ---------- 表記揺れマッチング（第2層＋第3層） ----------
   1. エイリアス辞書と正規化後の完全一致（同一店舗を優先）→ 自動一致（緑）
   2. Dice類似度 0.4 以上の商品を候補提示（黄）
   3. どちらも無ければ未知（赤）→ 人が確定し、確定時に辞書へ学習させる */
function matchLine(raw, storeId){
  const n = norm(raw);
  if(!n) return { status:'none', productId:null, candidates:[] };
  const al = state.data.aliases.find(a => a.norm === n && a.storeId === storeId)
          || state.data.aliases.find(a => a.norm === n);
  if(al) return { status:'auto', productId: al.productId, candidates:[] };
  const scored = state.data.products.map(p => {
    let s = dice(n, norm(p.name));
    state.data.aliases.filter(a => a.productId === p.id)
      .forEach(a => { s = Math.max(s, dice(n, a.norm)); });
    return { productId: p.id, score: s };
  }).filter(c => c.score >= 0.4).sort((a,b) => b.score - a.score).slice(0,3);
  if(scored.length) return { status:'cand', productId:null, candidates:scored };
  return { status:'none', productId:null, candidates:[] };
}

/* ---------- 集計 ---------- */
function lineTotal(l){ return num(l.price) * (num(l.qty) || 1) - num(l.discount); }
function itemTotal(i){ return num(i.price) * (num(i.qty) || 1) - num(i.discount); }

/* ---------- 月度（会計期間: 15日締め） ----------
   毎月15日〜翌月14日を1つの「月度」とする。月度名は締めが属する月
   （例: 6/15〜7/14 → 7月度）。締め日は上部の CYCLE_START で調整可能。 */
/* ある日付(Date)が属する月度を {y, m}（m=0-11, 月度の代表月=終了側の月）で返す */
function cycleOf(dt){
  let y = dt.getFullYear(), m = dt.getMonth();
  if(dt.getDate() >= CYCLE_START){ m += 1; if(m > 11){ m = 0; y += 1; } }  // 15日以降は翌月度
  return { y, m };
}
/* 月度(y,m)の期間 [開始日, 終了日]（YYYY-MM-DD文字列）を返す */
function cycleRange(y, m){
  const start = new Date(y, m - 1, CYCLE_START);   // 前月の15日
  const end   = new Date(y, m, CYCLE_START - 1);   // 当月の14日
  return { start: dstr(start), end: dstr(end) };
}
/* 日付文字列が月度(y,m)に含まれるか */
function inCycle(ds, y, m){ const r = cycleRange(y, m); return ds >= r.start && ds <= r.end; }
/* 月度ラベル: 「7月度（6/15〜7/14）」 */
function cycleLabel(y, m){
  const r = cycleRange(y, m);
  return `${m + 1}月度（${fmtMD(r.start)}〜${fmtMD(r.end)}）`;
}
/* 月度の合計支出 */
function sumCycle(y, m){ return confirmedItems().filter(i => inCycle(i.date, y, m)).reduce((a, i) => a + itemTotal(i), 0); }
/* 前後の月度へ移動 */
function cycleShift(y, m, delta){ m += delta; while(m < 0){ m += 12; y -= 1; } while(m > 11){ m -= 12; y += 1; } return { y, m }; }

/* ---------- 月度データのエクスポート（Claude分析用） ----------
   選択中の月度の明細を、分析に必要な文脈（商品・ジャンル・店舗・
   全期間の最安値・生活費）ごとJSON化する。これをClaudeに貼ると
   「損した額」と「支出傾向」の両面レポートが返せる。 */
function buildAnalysisJson(y, m){
  const range = cycleRange(y, m);
  const rows = confirmedItems().filter(i => inCycle(i.date, y, m));
  if(!rows.length) return null;

  /* 明細: 商品名・ジャンル・カテゴリ・店舗・日付・数量・単価（税込）・値引 */
  const items = rows.map(i => {
    const p = prodById(i.productId), s = storeById(i.storeId);
    return {
      date: i.date,
      store: s ? s.name : '?',
      product: p ? p.name : '?',
      genre: p ? (effGenre(p) || null) : null,
      category: p ? (effCategory(p) || null) : null,
      price: num(i.price), qty: num(i.qty) || 1, discount: num(i.discount),
      total: itemTotal(i)
    };
  });

  /* 参考情報: この月度に買った商品/ジャンルの「全期間での最安値」
     （どの店でいくらが底値か。損得の判定に使う） */
  const prodIds = Array.from(new Set(rows.map(i => i.productId)));
  const lowestByProduct = prodIds.map(pid => {
    const p = prodById(pid); const low = lowestOf(pid, null);
    return low ? { product: p ? p.name : '?', price: low.price,
      store: (storeById(low.storeId) || {}).name || '?', date: low.date } : null;
  }).filter(Boolean);
  const genres = Array.from(new Set(items.map(i => i.genre).filter(Boolean)));
  const lowestByGenre = genres.map(g => {
    const low = lowestOfGenre(g, null);
    if(!low) return null;
    const p = prodById(low.productId);
    return { genre: g, product: p ? p.name : '?', price: low.price,
      store: (storeById(low.storeId) || {}).name || '?', date: low.date };
  }).filter(Boolean);

  /* 前月度の合計（増減比較用） */
  const prev = cycleShift(y, m, -1);
  return {
    period: { label: cycleLabel(y, m), start: range.start, end: range.end },
    budget: num(state.cfg.budget) || null,
    totalSpent: sumCycle(y, m),
    prevPeriod: { label: cycleLabel(prev.y, prev.m), totalSpent: sumCycle(prev.y, prev.m) || null },
    items,
    lowestPrices: { byProduct: lowestByProduct, byGenre: lowestByGenre }
  };
}
async function exportAnalysis(){
  const y = state.calY, m = state.calM;   /* カレンダーで選択中の月度を対象にする */
  const data = buildAnalysisJson(y, m);
  if(!data){ toast(cycleLabel(y, m) + ' の明細がありません'); return; }
  const text = JSON.stringify(data, null, 1);
  try{
    await navigator.clipboard.writeText(text);
    toast(`${data.period.label}のデータをコピーしました（${data.items.length}明細）`);
  }catch(e){
    /* クリップボードAPIが使えない環境ではテキストエリア表示にフォールバック */
    state.exportText = text; render();
    toast('コピーできない環境のため、下に表示しました。全選択してコピーしてください');
  }
}

function daysAgoStr(days){ const d = new Date(); d.setDate(d.getDate() - days); return dstr(d); }
function lowestOf(pid, sinceStr){
  let rows = confirmedItems().filter(i => i.productId === pid);
  if(sinceStr) rows = rows.filter(i => i.date >= sinceStr);
  if(!rows.length) return null;
  return rows.reduce((a,b) => (b.price < a.price ? b : a));
}

const DONUT_COLORS = ['#7CB65C','#E3C84B','#5B8FA8','#C96F3B','#9AA59E'];
function cycleByCategory(y, mo){
  const m = {};
  confirmedItems().forEach(i => {
    if(!inCycle(i.date, y, mo)) return;
    const cat = effCategory(prodById(i.productId));
    m[cat] = (m[cat]||0) + itemTotal(i);
  });
  return Object.keys(m).map(k => ({ name: k, v: m[k] })).sort((a,b) => b.v - a.v);
}
function donutHtml(parts){
  const total = parts.reduce((a,p) => a + p.v, 0);
  if(!total) return '';
  let acc = 0;
  const segs = parts.map(p => {
    const a = acc/total*100, b = (acc+p.v)/total*100; acc += p.v;
    return `${p.color} ${a.toFixed(2)}% ${b.toFixed(2)}%`;
  });
  return `<div class="donut" style="background:conic-gradient(${segs.join(',')})"></div>`;
}

/* ジャンル横断の最安値: 同じジャンルの全商品を通した最安の明細を返す */
function lowestOfGenre(genre, sinceStr){
  const pids = state.data.products.filter(p => effGenre(p) === genre).map(p => p.id);
  let rows = confirmedItems().filter(i => pids.includes(i.productId));
  if(sinceStr) rows = rows.filter(i => i.date >= sinceStr);
  if(!rows.length) return null;
  return rows.reduce((a, b) => (b.price < a.price ? b : a));
}
function productsInGenre(genre){ return state.data.products.filter(p => effGenre(p) === genre); }
function resultsHtml(){
  const n = norm(state.q);
  let list = state.data.products;
  if(n){
    list = list.filter(p => {
      if(norm(p.name).includes(n)) return true;
      if(norm(effGenre(p)).includes(n)) return true;   // ジャンル名でもヒット
      return state.data.aliases.some(a => a.productId === p.id && a.norm.includes(n));
    });
  }
  if(!list.length) return '<div class="empty">見つかりません。表記を変えて試してください。</div>';

  /* 各商品の最安値（90日以内）を先に求める。以降すべて安い順に並べる */
  const lowMap = new Map();
  list.forEach(p => lowMap.set(p.id, lowestOf(p.id, daysAgoStr(90))));
  const priceOf = p => { const l = lowMap.get(p.id); return l ? l.price : Infinity; };  // 履歴なしは末尾

  /* ジャンル単位でグルーピング（同ジャンルが2件以上なら見出し＋横断最安を表示） */
  const groups = {}; const ungrouped = [];
  list.forEach(p => { const g = effGenre(p); if(g) (groups[g] = groups[g] || []).push(p); else ungrouped.push(p); });

  /* 2件以上のジャンルだけ見出し表示。1件のジャンルは未分類扱いで通常リストへ */
  const genreGroups = [];
  Object.keys(groups).forEach(g => {
    if(groups[g].length >= 2) genreGroups.push(g);
    else ungrouped.push(groups[g][0]);
  });
  /* グループはジャンル最安が安い順に並べる */
  genreGroups.sort((a, b) => {
    const la = lowestOfGenre(a, daysAgoStr(90)), lb = lowestOfGenre(b, daysAgoStr(90));
    return (la ? la.price : Infinity) - (lb ? lb.price : Infinity);
  });

  let html = '';
  genreGroups.forEach(g => {
    const ps = groups[g].slice().sort((a, b) => priceOf(a) - priceOf(b));   // グループ内も安い順
    const gLow = lowestOfGenre(g, daysAgoStr(90));
    html += `<div class="store-h" style="margin-top:16px;display:flex;align-items:baseline;gap:8px">
      <span>🏷️ ${esc(g)}</span>
      ${gLow ? `<span class="muted" style="font-weight:400;font-size:11px">ジャンル最安 <b class="price" style="color:var(--price-red)">${yen(gLow.price)}</b> @${esc(storeById(gLow.storeId)?.name||'')}</span>` : ''}
    </div><div class="card" style="margin-top:6px">`;
    ps.forEach(p => {
      const low = lowMap.get(p.id);
      const isGenreLow = gLow && low && low.price === gLow.price;
      html += `<div class="row" data-action="prod" data-id="${p.id}" style="cursor:pointer">
        <div class="grow"><div class="t1">${esc(p.name)}${isGenreLow?'<span class="badge">最安</span>':''}</div>
          <div class="t2">${esc(p.category||'')}</div></div>
        ${low ? `<div style="text-align:right"><div class="price ${isGenreLow?'red':''}">${yen(low.price)}</div>
          <div class="t2">${esc(storeById(low.storeId)?.name||'')}</div></div>` : '<div class="t2">履歴なし</div>'}
      </div>`;
    });
    html += `</div>`;
  });

  if(ungrouped.length){
    const ug = ungrouped.slice().sort((a, b) => priceOf(a) - priceOf(b));   // 未分類も安い順
    html += `<div class="card" style="margin-top:12px">` + ug.map(p => {
      const low = lowMap.get(p.id);
      const g = effGenre(p);
      return `<div class="row" data-action="prod" data-id="${p.id}" style="cursor:pointer">
        <div class="grow"><div class="t1">${esc(p.name)}</div>
          <div class="t2">${g?'🏷️'+esc(g)+'・':''}${esc(p.category||'')}</div></div>
        ${low ? `<div style="text-align:right"><div class="price">${yen(low.price)}</div>
          <div class="t2">${esc(storeById(low.storeId)?.name||'')}</div></div>` : '<div class="t2">履歴なし</div>'}
      </div>`;
    }).join('') + `</div>`;
  }
  return html;
}

/* ジャンル設定の保存: 同じ印字(raw)を持つ全商品にジャンルを付け、辞書学習する */
async function saveGenre(pid, genre){
  genre = String(genre || '').trim();
  if(!genre){ toast('ジャンル名を入力してください'); return; }
  const prod = prodById(pid);
  if(!prod) return;
  /* この商品に紐づく購入明細の印字(raw)を学習対象に集める（同じ印字は次回から自動分類） */
  const norms = new Set();
  const rawN = norm(prod.name); if(rawN) norms.add(rawN);
  state.data.items.forEach(i => { if(i.productId === pid && i.raw){ const n = norm(i.raw); if(n) norms.add(n); } });
  state.data.aliases.forEach(a => { if(a.productId === pid && a.norm) norms.add(a.norm); });
  const learnNorms = Array.from(norms);
  try{
    busy('ジャンルを保存中…');
    await api('setGenre', { genre, productIds:[pid], learnNorms });
    prod.genre = genre;
    /* ローカルのジャンル辞書にも学習を反映（既存の印字は上書き＝付け直しが効く） */
    if(!state.data.genres) state.data.genres = [];
    learnNorms.forEach(n => {
      const ex = state.data.genres.find(g => g.norm === n);
      if(ex) ex.genre = genre; else state.data.genres.push({ norm:n, genre });
    });
    state.genreEdit = null; state.genreInput = '';
    saveCache(); render();
    toast(`「${genre}」に設定しました`);
  }catch(err){
    toast('保存に失敗: ' + err.message);
  }finally{ busy(null); }
}

function mergeListHtml(){
  const q = norm(state.mergeQ || '');
  let list = state.data.products.slice();
  if(q) list = list.filter(p => norm(p.name).includes(q) ||

  list.sort((a,b) => productStats(b.pid||b.id).count - productStats(a.pid||a.id).count);
  if(!list.length) return '<div class="empty">商品がありません</div>';

      <div style="width:22px;flex:none">${on ? '✅' : '⬜️'}</div>
      <div class="grow"><div class="t1">${esc(p.name)}</div>
        <div class="t2">${esc(effCategory(p))}・${st.count}回${st.low!=null?'・最安'+yen(st.low):''}</div></div>
    </div>`;

async function doMerge(){
  const ids = state.mergeSel.slice();
  if(ids.length < 2){ toast('2つ以上選んでください'); return; }
  /* 統合先（キープする商品）＝購入回数が最多のもの。名前もそれを採用 */
  const keep = ids.map(id => ({ id, c: productStats(id).count }))
    .sort((a,b) => b.c - a.c)[0].id;
  const gone = ids.filter(id => id !== keep);
  const keepName = (prodById(keep)||{}).name || '';
  try{
    busy('統合中…');
    await api('merge', { keepId: keep, mergeIds: gone });
    /* ローカル反映: 明細のproductId付け替え、辞書の付け替え、商品マスタから統合元を削除 */
    state.data.items.forEach(i => { if(gone.includes(i.productId)) i.productId = keep; });
    state.data.aliases.forEach(a => { if(gone.includes(a.productId)) a.productId = keep; });
    state.data.products = state.data.products.filter(p => !gone.includes(p.id));
    state.mergeSel = [];
    saveCache();
    render();
    toast(`「${keepName}」に統合しました`);
  }catch(err){
    toast('統合に失敗: ' + err.message);
  }finally{ busy(null); }
}

/* ================================================================
   確認画面（OCR結果の確認・手入力 共用）
   緑=辞書で自動一致 / 黄=候補あり / 赤=未知（要選択）
   ================================================================ */
function newLine(){ return { raw:'', price:'', qty:1, discount:0, productId:null, status:'none',
  candidates:[], editing:true, locked:false, query:'' }; }

function resolveStoreFromOcr(r){
  /* OCRの推定店舗名を既存マスタと照合。一致すれば自動選択、
     未知の店なら自動で新規登録して選択済みにする（保存は確定時） */
  const name = (r.storeName || '').trim();
  if(name){
    const n = norm(name);
    let st = state.data.stores.find(s => norm(s.name) === n)
          || state.data.stores.find(s => { const m = norm(s.name); return m && (n.includes(m) || m.includes(n)); });
    if(!st){
      /* 支店名（〇〇店）の核で既存店を照合：「北池袋店」→「ドン・キホーテ北池袋」に一致 */
      const bm = name.match(/([^\s　]{2,})店$/);
      if(bm){
        const core = norm(bm[1]);
        const hits = state.data.stores.filter(s => norm(s.name).includes(core));
        if(hits.length === 1) st = hits[0];
        else if(hits.length > 1){
          let best = null, bs = -1;
          hits.forEach(s => { const d = dice(n, norm(s.name)); if(d > bs){ bs = d; best = s; } });
          st = best;
        }
      }
    }
    if(!st){
      let best = null, bs = 0;
      state.data.stores.forEach(s => { const d = dice(n, norm(s.name)); if(d > bs){ bs = d; best = s; } });
      if(bs >= 0.6) st = best;   /* OCRの微妙な誤読は類似照合で吸収 */
    }
    if(st) return { storeId: st.id, newStores: [] };
    const ns = { id: uid('S'), name: name };
    return { storeId: ns.id, newStores: [ns] };
  }
  const hint = r.storeHint || '';
  const st = state.data.stores.find(s => hint && (hint.includes(s.name) || s.name.includes(hint)));
  return { storeId: st ? st.id : null, newStores: [] };
}
/* OCR行を、確認画面で最初から「商品セット済み」の状態にする（A案）。
   1) 店舗×印字が辞書にあれば既存商品に紐付け（緑）
   2) なければ、同名（正規化一致）の既存商品を探して紐付け
   3) それも無ければ、印字テキストそのものを商品名として新規商品を自動作成
   いずれも後から「商品をえらぶ」で差し替え可能。誤読が気になる行だけ直せばよい。 */
function autoResolveLine(l, storeId, freshProducts){
  const raw = (l.raw || '').trim();
  if(!raw) return;
  if(l.productId) return;
  const n = norm(raw);
  const hit = allProducts().concat(freshProducts).find(pr => norm(pr.name) === n);
  if(hit){ l.productId = hit.id; l.locked = true; l.editing = false; return; }
  const np = { id: uid('P'), name: raw, category: guessCategory(raw), amount:'', unit:'', genre: guessGenre(raw, raw) };
  freshProducts.push(np);
  l.productId = np.id; l.locked = true; l.editing = false;
  l._autoNamed = true;   /* 印字から自動命名した目印（UIで控えめに示す） */
}
function openPendingFromOcr(r){
  try{ store.set('kakeibo_last_ocr', r.rawText || ''); }catch(e){}   /* デバッグ用に原文を保持 */
  const sv = resolveStoreFromOcr(r);
  state.pending = {
    date: (r.date && /^\d{4}-\d{2}-\d{2}$/.test(r.date) && !isNaN(Date.parse(r.date))) ? r.date : todayStr(),
    storeId: sv.storeId,
    ocrTotal: (r.total ?? null), ocrSubtotal: (r.subtotal ?? null), method:'OCR',
    lines: (r.lines||[]).map(l => Object.assign(
      { raw:l.raw||'', price:l.price??'', qty:l.qty||1, discount:l.discount||0,
        t8:!!l.t8, editing:false, locked:false, query:'' },
      matchLine(l.raw, sv.storeId))),
    newProducts:[], newStores: sv.newStores, addingStore:false, newStoreName:''
  };
  /* 税抜表示の店なら、レシート記載の税額を各品目へ按分して税込に換算 */
  applyTaxConversion(state.pending, r);
  /* A案: 辞書照合（緑）を尊重しつつ、残った行を自動セット。
     完全一致（正規化）する既存商品があれば自動確定、あいまい候補のみ黄で提示 */
  const fresh = state.pending.newProducts;
  state.pending.lines.forEach(l => {
    if(l.productId){ l.locked = true; l.editing = false; return; }
    if(l.status === 'cand'){
      const n = norm(l.raw);
      const exact = allProducts().find(pr => norm(pr.name) === n);
      if(exact){ l.productId = exact.id; l.locked = true; l.editing = false; }
      return;   /* あいまい候補は黄のまま。放置して保存しても確定時に自動解決される */
    }
    autoResolveLine(l, sv.storeId, fresh);
  });
  renderConfirm();
}

/* ---------- 税込換算（方式B: 品目ごとの固定計算・一貫性優先） ----------
   税抜表示（外税）の店の各品目を「税抜単価 ×（1＋税率）を四捨五入」で税込化する。
   カゴの中身に左右されないため、同じ棚価格なら常に同じ税込単価になり、
   店をまたいだ底値比較が安定する（方式Aで起きていた±1円のブレを解消）。
   レシートの支払額とは端数の丸めで数円ズレることがあるが、検算は
   「税抜合計＝小計」の一致で読み取り漏れの有無を保証する。 */
function applyTaxConversion(p, r){
  const tax = r.tax;
  if(!tax || tax.mode !== 'excl') return;   // 内税表示は既に税込
  const lines = p.lines;
  if(!lines.length) return;

  /* 無印商品に使う税率はレシート記載の税率から（8%のみ→8、10%あり→10） */
  const rates = (tax.rates || []);
  const present = rates.map(x => x.rate);
  let otherRate;
  if(present.length === 1) otherRate = present[0];
  else if(present.includes(10)) otherRate = 10;
  else if(present.includes(8)) otherRate = 8;
  else otherRate = 8;

  /* 読み取り漏れチェック: 税抜合計がレシート小計と一致するか（換算前に確定して保持） */
  const gross = l => num(l.price) * (num(l.qty) || 1) - num(l.discount);
  const gsum = lines.reduce((a, l) => a + gross(l), 0);
  p.preTaxSum = gsum;
  p.taxOk = (p.ocrSubtotal == null) || Math.abs(gsum - p.ocrSubtotal) <= 2;

  /* 品目ごとの固定計算（単価・値引の両方を税込へ。四捨五入） */
  lines.forEach(l => {
    const rate = l.t8 ? 8 : otherRate;
    const f = 1 + rate / 100;
    l.price = Math.round(num(l.price) * f);
    if(num(l.discount)) l.discount = Math.round(num(l.discount) * f);
  });
  p.taxConverted = true;
}

function lineStateCls(l){
  if(l.productId) return l._autoNamed ? 'st-cand' : 'st-ok';   /* 印字から自動命名は黄（要確認）*/
  return l.status === 'cand' ? 'st-cand' : 'st-none';
}
function sugHtml(i){
  const l = P().lines[i], q = (l.query||'').trim();
  if(!q) return '<div class="hint">商品名を入力（そのまま保存すると自動登録されます）</div>';
  const n = norm(q);
  const sc = allProducts().map(p => ({
      p, s: Math.max(dice(n, norm(p.name)), norm(p.name).includes(n) ? 0.99 : 0) }))
    .filter(x => x.s >= 0.25).sort((a,b) => b.s - a.s).slice(0,6);
  return sc.map(x =>
      `<button class="chip" data-action="cf-pick" data-i="${i}" data-pid="${x.p.id}">${esc(x.p.name)}</button>`).join('')
    + `<button class="chip new" data-action="cf-new" data-i="${i}">＋「${esc(q)}」を新規登録</button>`;
}
function cfLineHtml(l, i){
  const prod = l.productId ? prodById(l.productId) : null;
  let zone = '';
  if(l.editing){
    zone = `<input class="in" data-bind="cf-find" data-i="${i}" placeholder="商品名を入力（保存時に自動登録）" value="${esc(l.query||'')}" autocomplete="off">
            <div class="sug" id="sug-${i}">${sugHtml(i)}</div>`;
  } else if(prod){
    const tag = l._autoNamed ? ' <span class="pct">印字から</span>' : '';
    zone = `<div class="pline"><span class="pname">${esc(prod.name)}${tag}</span>
            <button class="lnk" data-action="cf-edit" data-i="${i}">変更</button></div>`;
  } else if(l.status === 'cand'){
    zone = `<div class="chips">${l.candidates.map(c => {
        const p = prodById(c.productId); if(!p) return '';
        return `<button class="chip" data-action="cf-pick" data-i="${i}" data-pid="${p.id}">
          ${esc(p.name)} <span class="pct">${Math.round(c.score*100)}%</span></button>`;
      }).join('')}
      <button class="chip" data-action="cf-edit" data-i="${i}">その他…</button></div>`;
  } else {
    zone = `<button class="chip alert" data-action="cf-edit" data-i="${i}">商品をえらぶ</button>`;
  }
  return `<div class="lcard ${lineStateCls(l)}">
    ${zone}
    ${l.raw ? `<div class="raw">印字: ${esc(l.raw)}</div>` : ''}
    <div class="nums">
      <div class="f"><span class="lab">単価</span>
        <input class="in mini" inputmode="decimal" data-bind="cf-price" data-i="${i}" value="${esc(l.price)}"></div>
      <div class="f" style="max-width:72px"><span class="lab">数量</span>
        <input class="in mini" inputmode="numeric" data-bind="cf-qty" data-i="${i}" value="${esc(l.qty)}"></div>
      <div class="f" style="max-width:86px"><span class="lab">値引</span>
        <input class="in mini" inputmode="numeric" data-bind="cf-disc" data-i="${i}" value="${esc(l.discount)}"></div>
      <div class="ltotal" id="lt-${i}">${yen(lineTotal(l))}</div>
      <button class="del" data-action="cf-del" data-i="${i}" aria-label="この行を削除">✕</button>
    </div>
  </div>`;
}
function renderConfirm(){
  const ov = $('#confirm');
  const p = P();
  if(!p){ ov.classList.remove('open'); ov.innerHTML = ''; return; }
  const storeChips = allStores().map(s => {
    const isNew = p.newStores.some(x => x.id === s.id);
    return `<button class="chip ${p.storeId===s.id?'on':''}" data-action="cf-store" data-id="${s.id}">${esc(s.name)}${isNew?' <span class="pct">新規</span>':''}</button>`;
  }).join('')
    + (p.addingStore
      ? `<input class="in" style="max-width:150px;padding:7px 10px" data-bind="cf-newstore" value="${esc(p.newStoreName)}" placeholder="店舗名" autocomplete="off">
         <button class="chip on" data-action="cf-store-add">追加</button>`
      : `<button class="chip new" data-action="cf-store-toggle">＋店舗</button>`);
  ov.innerHTML = `
    <div class="ov-head">
      <button class="lnk" data-action="cf-close" style="color:var(--muted)">閉じる</button>
      <h2>${p.method==='OCR' ? '読み取り結果の確認' : '手入力'}</h2>
      <span style="width:52px"></span>
    </div>
    <div class="ov-body">
      <div class="legend">
        <span><i style="background:var(--ok)"></i>辞書一致</span>
        <span><i style="background:var(--tag-yellow)"></i>印字から自動・候補</span>
        <span><i style="background:var(--err)"></i>要選択</span>
      </div>
      ${p.method==='OCR' ? '<p class="hint" style="margin:-4px 0 12px">印字を商品名として自動登録しました。おかしい行だけ「変更」で直して保存できます。</p>' : ''}
      ${p.taxConverted ? '<p class="hint" style="margin:-4px 0 12px;color:var(--green)">この店は税抜表示のため、単価を税込に換算しています。</p>' : ''}
      <div class="field"><label>店舗</label>
        <div class="chips scroll">${storeChips}</div></div>
      <div class="field" style="margin:12px 0 14px;max-width:190px"><label>購入日</label>
        <input class="in" type="date" data-bind="cf-date" value="${esc(p.date)}"></div>
      <div id="cf-lines">${p.lines.map(cfLineHtml).join('')}</div>
      <button class="btn btn-ghost" data-action="cf-add">＋ 行を追加</button>
    </div>
    <div class="ov-foot">
      <div class="sumline">
        <span class="muted">明細合計</span><b class="mono" id="cf-sum"></b>
        <span class="sp"></span><span id="cf-chk"></span>
      </div>
      <button class="btn btn-primary" data-action="cf-confirm">確定して保存</button>
    </div>`;
  ov.classList.add('open');
  updateCfSum();
}
function cfCheckText(sum, total, sub, converted, taxOk, preTax){
  if(converted){
    /* 方式B: ✓の基準は「税抜合計＝小計」（読み取り漏れなしの証明）。支払額は参考表示 */
    if(taxOk){
      if(sub != null)
        return `<span class="chk-ok">✓ 小計 ${yen(sub)} と一致・税込換算済み${total != null ? `（支払 ${yen(total)}）` : ''}</span>`;
      return `<span class="chk-ok">✓ 税込換算済み${total != null ? `（支払 ${yen(total)}）` : ''}</span>`;
    }
    const d = Math.round((preTax || 0) - (sub || 0));
    return `<span class="chk-ng">⚠ 税抜合計 ${yen(preTax || 0)} が小計 ${yen(sub || 0)} と不一致（差 ${yen(d)}）・読み取り漏れの可能性</span>`;
  }
  if(total == null && sub == null) return '';
  if(total != null && Math.round(sum - total) === 0)
    return `<span class="chk-ok">✓ レシート合計 ${yen(total)} と一致</span>`;
  if(sub != null && Math.round(sum - sub) === 0)
    return `<span class="chk-ok">✓ 小計 ${yen(sub)} と一致（税抜表示の店）${total != null ? '／支払 ' + yen(total) : ''}</span>`;
  const base = total != null ? total : sub;
  const label = total != null ? 'レシート合計' : '小計';
  return `<span class="chk-ng">⚠ ${label} ${yen(base)} と差額 ${yen(Math.round(sum - base))}</span>`;
}
function updateCfSum(){
  const p = P(); if(!p) return;
  const sum = p.lines.reduce((a,l) => a + lineTotal(l), 0);
  const el = $('#cf-sum'); if(el) el.textContent = yen(sum);
  const chk = $('#cf-chk'); if(!chk) return;
  chk.innerHTML = cfCheckText(sum, p.ocrTotal == null ? null : p.ocrTotal,
    p.ocrSubtotal == null ? null : p.ocrSubtotal, !!p.taxConverted, !!p.taxOk, p.preTaxSum);
}
function pickProduct(i, pid){
  const l = P().lines[i];
  l.productId = pid; l.locked = true; l.editing = false;
  renderConfirm();
}
function newProductFromLine(i){
  const l = P().lines[i];
  const name = (l.query||'').trim();
  if(!name){ toast('商品名を入力してください'); return; }
  const np = { id: uid('P'), name, category: guessCategory(name), amount:'', unit:'', genre: guessGenre(name, name) };
  P().newProducts.push(np);
  l.productId = np.id; l.locked = true; l.editing = false;
  renderConfirm();
}
function setStore(id){
  const p = P();
  p.storeId = id;
  /* 店が変わったら、未確定の行だけ再マッチング（辞書は店舗優先のため） */
  p.lines.forEach(l => { if(!l.locked && l.raw) Object.assign(l, matchLine(l.raw, id)); });
  renderConfirm();
}
function addStore(){
  const p = P();
  const name = (p.newStoreName||'').trim();
  if(!name){ toast('店舗名を入力してください'); return; }
  const ns = { id: uid('S'), name };
  p.newStores.push(ns);
  p.storeId = ns.id; p.addingStore = false; p.newStoreName = '';
  renderConfirm();
}
async function confirmPending(){
  const p = P();
  if(!p.storeId){ toast('店舗を選択してください'); return; }
  /* 完全に空の行は黙って除去 */
  p.lines = p.lines.filter(l => l.productId || (l.query||'').trim() || l.raw || num(l.price) > 0);
  /* 商品名が入力済みの行は自動解決：既存商品と正規化一致なら紐付け、なければ自動で新規登録
     ※OCRの印字（raw）だけの行は対象外。誤読テキストが商品マスタに混入するのを防ぐため人の確認を挟む */
  p.lines.forEach(l => {
    if(l.productId) return;
    const q = (l.query||'').trim();
    if(!q) return;
    const n = norm(q);
    const hit = allProducts().find(pr => norm(pr.name) === n);
    if(hit){ l.productId = hit.id; l.locked = true; l.editing = false; return; }
    const np = { id: uid('P'), name: q, category: guessCategory(q), amount:'', unit:'', genre: guessGenre(q, q) };
    p.newProducts.push(np);
    l.productId = np.id; l.locked = true; l.editing = false;
  });
  /* A案: 印字だけの未解決行（黄の候補を放置した場合など）も印字名で自動解決 */
  p.lines.forEach(l => {
    if(!l.productId && (l.raw||'').trim()) autoResolveLine(l, p.storeId, p.newProducts);
  });
  if(!p.lines.length){ toast('明細がありません'); return; }
  const noProd = p.lines.filter(l => !l.productId).length;
  if(noProd){ toast(`商品が未選択の行が ${noProd} 行あります`); return; }
  const noPrice = p.lines.filter(l => num(l.price) <= 0).length;
  if(noPrice){ toast(`単価が未入力の行が ${noPrice} 行あります`); return; }

  const items = p.lines.map(l => ({
    id: uid('I'), date: p.date, storeId: p.storeId, productId: l.productId,
    raw: l.raw, price: num(l.price), qty: num(l.qty)||1, discount: num(l.discount),
    status:'確定', method: p.method
  }));
  /* 表記揺れ辞書の学習：印字テキストがあり、まだ辞書に無い対応を登録
     ※OCRの誤読でも「同じ店は毎回同じ誤読」になるため学習して問題ない */
  const newAliases = [];
  p.lines.forEach(l => {
    if(!l.raw) return;
    const n = norm(l.raw);
    const dup = state.data.aliases.concat(newAliases)
      .some(a => a.norm === n && a.storeId === p.storeId);
    if(!dup) newAliases.push({ norm:n, storeId:p.storeId, productId:l.productId });
  });
  const usedStores = p.newStores.filter(s => s.id === p.storeId);
  const usedProducts = p.newProducts.filter(np => p.lines.some(l => l.productId === np.id));
  try{
    busy('保存中…');
    await api('save', { items, newProducts:usedProducts, newStores:usedStores, newAliases });
    state.data.items.push(...items);
    state.data.products.push(...usedProducts);
    state.data.stores.push(...usedStores);
    state.data.aliases.push(...newAliases);
    saveCache();
    state.pending = null;
    renderConfirm();
    state.view = 'home'; render();
    toast(`${items.length}件を登録しました`);
  }catch(err){
    toast('保存に失敗: ' + err.message);
  }finally{ busy(null); }
}

/* ================================================================
   カメラ → 縮小 → OCR
   ================================================================ */
function shrink(file){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1600;
      const sc = Math.min(1, MAX / Math.max(img.width, img.height));
      const cv = document.createElement('canvas');
      cv.width = Math.round(img.width * sc); cv.height = Math.round(img.height * sc);
      cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
      URL.revokeObjectURL(img.src);
      resolve(cv.toDataURL('image/jpeg', 0.82).split(',')[1]);
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}
async function onPhoto(e){
  const f = e.target.files && e.target.files[0];
  e.target.value = '';
  if(!f) return;
  try{
    busy('画像を圧縮中…');
    const b64 = await shrink(f);
    busy('OCRで読み取り中…（10秒ほどかかります）');
    const r = await api('ocr', { image: b64, mime:'image/jpeg' });
    openPendingFromOcr(r);
  }catch(err){
    toast('読み取りに失敗: ' + err.message);
  }finally{ busy(null); }
}

/* ================================================================
   デモモード（GAS未接続時の疑似バックエンド）
   ================================================================ */
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t;
  return ((t^t>>>14)>>>0)/4294967296; }; }

function genDemo(){
  const stores = [
    { id:'S1', name:'OKストア' }, { id:'S2', name:'業務スーパー' },
    { id:'S3', name:'ライフ' },   { id:'S4', name:'マルエツ' }
  ];
  const defs = [
    ['P1','明治おいしい牛乳','乳製品',1000,'ml',218],
    ['P2','食パン（6枚切）','パン',6,'枚',128],
    ['P3','たまご（10個）','卵',10,'個',248],
    ['P4','バナナ','果物',1,'袋',148],
    ['P5','鶏むね肉','肉',300,'g',288],
    ['P6','豚こま切れ','肉',200,'g',258],
    ['P7','明治ブルガリアヨーグルト','乳製品',400,'g',158],
    ['P8','トマト','野菜',1,'個',98],
    ['P9','納豆（3パック）','大豆製品',3,'個',88]
  ];
  const products = defs.map(d => ({ id:d[0], name:d[1], category:d[2], amount:d[3], unit:d[4], genre: guessGenre(d[1], d[1]) }));
  const base = Object.fromEntries(defs.map(d => [d[0], d[5]]));
  const mult = { S1:0.92, S2:0.86, S3:1.08, S4:1.0 };
  const aliases = [
    ['ｷﾞｭｳﾆｭｳ 1000ML','S1','P1'], ['ﾒｲｼﾞｵｲｼｲｷﾞｭｳﾆｭｳ','S3','P1'],
    ['ｼｮｸﾊﾟﾝ 6ﾏｲ','S1','P2'], ['ﾀﾏｺﾞ 10ｺ','S2','P3']
  ].map(a => ({ norm: norm(a[0]), storeId:a[1], productId:a[2] }));
  const rnd = mulberry32(20260703);
  const items = [];
  for(let back = 69; back >= 0; back--){
    if(rnd() > 0.5) continue;
    const d = new Date(); d.setDate(d.getDate() - back);
    const sid = stores[Math.floor(rnd()*stores.length)].id;
    const picks = products.slice().sort(() => rnd()-0.5).slice(0, 2+Math.floor(rnd()*3));
    picks.forEach(p => {
      const price = Math.round(base[p.id] * mult[sid] * (0.94 + rnd()*0.12));
      items.push({
        id: uid('I'), date: dstr(d), storeId: sid, productId: p.id,
        raw:'', price, qty: rnd() < 0.15 ? 2 : 1,
        discount: rnd() < 0.12 ? Math.round(price * (0.1 + rnd()*0.1)) : 0,
        status:'確定', method:'手動'
      });
    });
  }
  return { items, products, stores, aliases, genres:[] };
}

/* ================================================================
   JSONインポート（Geminiで抽出したレシートJSONを一括取り込み）
   各レシートを、確認画面と同じ処理（店舗自動照合／登録・辞書学習・
   税込配賦・重複除去）に通して保存する。手動OCRの学習フェーズ用。
   ================================================================ */
function parseImportJson(text){
  let data;
  try{ data = JSON.parse(text); }
  catch(e){ throw new Error('JSONの形式が正しくありません: ' + e.message); }
  const arr = Array.isArray(data) ? data : [data];   // 1枚でも配列でも受ける
  if(!arr.length) throw new Error('レシートが空です');
  const norm2 = v => (v == null ? '' : String(v));
  const receipts = arr.map((r, ri) => {
    const items = (r.items || r.購入品 || []).map(it => ({
      raw:  norm2(it.raw || it.品目 || it.name || it.商品名).trim(),
      name: norm2(it.name || it.品目 || it.raw).trim(),
      price: num(it.price != null ? it.price : it.単価),
      qty:  num(it.qty != null ? it.qty : it.数量) || 1,
      discount: num(it.discount != null ? it.discount : it.値引),
      taxRate: num(it.taxRate != null ? it.taxRate : it.税率) || null,
      genre: norm2(it.genre || it.ジャンル).trim()
    })).filter(it => it.raw || it.name);
    let date = norm2(r.date || r.日付).trim();
    const dm = date.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);   // 2026年07月01日 等も許容
    if(dm) date = dm[1] + '-' + ('0'+dm[2]).slice(-2) + '-' + ('0'+dm[3]).slice(-2);
    if(!/^\d{4}-\d{2}-\d{2}$/.test(date) || isNaN(Date.parse(date))) date = todayStr();
    return {
      date,
      store: norm2(r.store || r.店舗 || r.storeName).trim(),
      taxMode: (r.taxMode === 'excl' || r.taxMode === 'incl') ? r.taxMode : null,
      subtotal: r.subtotal != null ? num(r.subtotal) : null,
      total: r.total != null ? num(r.total) : null,
      items
    };
  }).filter(r => r.items.length);
  return receipts;
}

/* 1レシート分を pending 相当に変換（確認画面ロジックを再利用） */
function receiptToPending(r){
  const sv = resolveStoreFromOcr({ storeName: r.store, storeHint: r.store });
  const taxRates = [];
  [8, 10].forEach(rate => {
    if(r.items.some(it => it.taxRate === rate)) taxRates.push({ rate, base:null, tax:null });
  });
  const pending = {
    date: r.date, storeId: sv.storeId,
    ocrTotal: (r.total != null ? r.total : null),
    ocrSubtotal: (r.subtotal != null ? r.subtotal : null),
    method: 'インポート',
    lines: r.items.map(it => Object.assign(
      { raw: it.raw, cleanName: it.name || it.raw, price: it.price, qty: it.qty, discount: it.discount,
        t8: it.taxRate === 8, genre: it.genre || '', editing:false, locked:false, query:'' },
      matchLine(it.raw || it.name, sv.storeId))),
    newProducts:[], newStores: sv.newStores, addingStore:false, newStoreName:''
  };
  /* 税込配賦（外税表示のときのみ換算） */
  applyTaxConversion(pending, { tax: { mode: r.taxMode || 'incl', has8:false, has10:false, rates: taxRates } });
  /* 各行の商品を解決：辞書一致→既存同名→印字名で新規（確認画面と同じA案） */
  const fresh = pending.newProducts;
  pending.lines.forEach(l => {
    if(l.productId){ l.locked = true; l.editing = false; return; }
    const n = norm(l.raw);
    const exact = allProductsIn(pending).find(pr => norm(pr.name) === n);
    if(exact){ l.productId = exact.id; l.locked = true; l.editing = false; return; }
    const nm = (l.cleanName || l.raw);
    const np = { id: uid('P'), name: nm, category: guessCategory(nm), amount:'', unit:'',
      genre: l.genre || guessGenre(l.raw, nm) };   /* 商品名はGeminiの整形名、ジャンルはGemini優先 */
    fresh.push(np); l.productId = np.id; l.locked = true; l.editing = false;
  });
  return pending;
}
function allProductsIn(pending){ return state.data.products.concat(pending.newProducts); }

/* JSON一括取り込みの実行 */
async function runImport(text){
  let receipts;
  try{ receipts = parseImportJson(text); }
  catch(err){ toast(err.message); return; }
  if(!confirm(`${receipts.length}枚のレシートを取り込みます。よろしいですか？`)) return;

  const allItems = [], allProducts = [], allStores = [], allAliases = [], allGenres = [];
  const storeKey = {};   // 同一インポート内での店舗重複を防ぐ（正規化名→id）
  state.data.stores.forEach(s => { storeKey[norm(s.name)] = s.id; });

  receipts.forEach(r => {
    const p = receiptToPending(r);
    /* インポート内で同名店舗が複数回新規作成されるのを1つに統合 */
    p.newStores = p.newStores.filter(ns => {
      const k = norm(ns.name);
      if(storeKey[k]){ if(p.storeId === ns.id) p.storeId = storeKey[k]; return false; }
      storeKey[k] = ns.id; return true;
    });
    if(!p.storeId) return;   // 店舗不明はスキップ
    const usedStores = p.newStores.filter(s => s.id === p.storeId);
    const usedProducts = p.newProducts.filter(np => p.lines.some(l => l.productId === np.id));
    p.lines.forEach(l => {
      allItems.push({ id: uid('I'), date: p.date, storeId: p.storeId, productId: l.productId,
        raw: l.raw, price: num(l.price), qty: num(l.qty)||1, discount: num(l.discount),
        status:'確定', method:'インポート' });
      if(l.raw){
        const nz = norm(l.raw);
        const dup = state.data.aliases.concat(allAliases).some(a => a.norm === nz && a.storeId === p.storeId);
        if(!dup) allAliases.push({ norm: nz, storeId: p.storeId, productId: l.productId });
      }
      /* Geminiが付けたジャンルを辞書学習: 印字と、紐付いた商品名の両方の正規化で登録
         （既存商品に紐付いた場合も、商品名の辞書エントリで effGenre が効くようになる） */
      if(l.genre){
        const prod = prodById(l.productId) || allProducts.find(x => x.id === l.productId);
        [l.raw, prod ? prod.name : ''].forEach(t => {
          const gz = norm(t);
          if(gz && !state.data.genres.some(g => g.norm === gz) && !allGenres.some(g => g.norm === gz))
            allGenres.push({ norm: gz, genre: l.genre });
        });
        if(prod && !prod.genre) prod.genre = l.genre;   /* ローカル即反映 */
      }
    });
    usedStores.forEach(s => allStores.push(s));
    usedProducts.forEach(pr => allProducts.push(pr));
    /* 次のレシートの照合に、今作った商品・店舗も見えるよう即反映 */
    state.data.products = state.data.products.concat(usedProducts);
    state.data.stores = state.data.stores.concat(usedStores);
    state.data.aliases = state.data.aliases.concat(allAliases.filter(a => !state.data.aliases.includes(a)));
  });

  if(!allItems.length){ toast('取り込める明細がありませんでした'); return; }
  try{
    busy(`${receipts.length}枚を保存中…`);
    await api('save', { items: allItems, newProducts: allProducts, newStores: allStores,
      newAliases: allAliases, newGenres: allGenres });
    state.data.items = state.data.items.concat(allItems);
    state.data.genres = (state.data.genres || []).concat(allGenres);
    saveCache();
    state.importText = '';
    state.view = 'home'; render();
    toast(`${receipts.length}枚・${allItems.length}明細を取り込みました`);
  }catch(err){
    toast('保存に失敗: ' + err.message);
  }finally{ busy(null); }
}

      const inp = document.querySelector('[data-bind="genre-input"]'); if(inp) inp.focus(); break; }

  if(b === 'q'){
    state.q = v; state.selProd = null;
    const el = $('#results'); if(el) el.innerHTML = resultsHtml();
  } else if(b === 'cf-date'){ p.date = v; }
  else if(b === 'imp-text'){ state.importText = v; }
  else if(b === 'merge-q'){
    state.mergeQ = v;
    const el = $('#merge-list'); if(el) el.innerHTML = mergeListHtml();
  }
  else if(b === 'genre-q'){
    state.genreQ = v;
    const el = $('#genre-list'); if(el) el.innerHTML = genreListHtml();
  }
  else if(b === 'genre-input'){ state.genreInput = v; }
  else if(b === 'cf-newstore'){ p.newStoreName = v; }
  else if(b === 'cf-find'){
    const i = +e.target.dataset.i;
    p.lines[i].query = v;
    const s = $('#sug-' + i); if(s) s.innerHTML = sugHtml(i);
  }
  else if(b === 'cf-price' || b === 'cf-qty' || b === 'cf-disc'){
    const i = +e.target.dataset.i, l = p.lines[i];
    if(b === 'cf-price') l.price = v;
    else if(b === 'cf-qty') l.qty = v;
    else l.discount = v;
    const lt = $('#lt-' + i); if(lt) lt.textContent = yen(lineTotal(l));
    updateCfSum();
  }
});
$('#camIn').addEventListener('change', onPhoto);
$('#libIn').addEventListener('change', onPhoto);

/* ---------- 起動 ---------- */
(function init(){
  try{ state.cfg = Object.assign(state.cfg, JSON.parse(store.get('kakeibo_cfg') || '{}')); }catch(e){}
  let cached = null;
  try{ cached = JSON.parse(store.get('kakeibo_cache') || 'null'); }catch(e){}
  if(cached && cached.data){
    state.data = cached.data; state.demo = !!cached.demo; state.lastSync = cached.ts || null;
  } else if(!state.cfg.gasUrl){
    loadDemo();   /* 初回はデモデータで全画面を体験できる */
  }
  render();
  if(state.cfg.gasUrl) sync(false);   /* 背景同期 */
})();

/* ピンチズーム・ダブルタップズームの抑止（iOS向け。スクロールには影響しない） */
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('dblclick', e => e.preventDefault());

/* Service Worker（GitHub Pages等のHTTPS環境でのみ有効。プレビューでは静かにスキップ） */
if('serviceWorker' in navigator && location.protocol === 'https:'){
  addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}
